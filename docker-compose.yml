version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: personalscrum-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: personalscrum
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
#    ports:
#      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: personalscrum-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/personalscrum
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      JWT_SECRET: ${JWT_SECRET:-myLocalDevelopmentSecretKeyMustBe32Chars!}
      ALLOWED_ORIGINS: http://localhost:3005
    ports:
      - '8085:8080'
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: personalscrum-frontend
    restart: unless-stopped
    ports:
      - '3005:80'
    depends_on:
      - backend

volumes:
  postgres_data:
