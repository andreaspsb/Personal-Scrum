spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/personalscrum}
    username: ${DATABASE_USER:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET:bXlEZWZhdWx0U2VjcmV0S2V5Rm9yRGV2ZWxvcG1lbnRQdXJwb3Nlc09ubHkzMmNoYXJz}
  expiration: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health
